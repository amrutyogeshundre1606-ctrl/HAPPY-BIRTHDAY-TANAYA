
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Tanaya ❤️</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      background: linear-gradient(135deg,#ff9ec4,#ffcce0,#ffe7f0);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
    }

    .container{
      text-align:center;
      padding:20px;
      animation: fadeIn 2s ease;
    }

    h1{
      font-size: clamp(2.5rem,8vw,5rem);
      color:white;
      text-shadow:0 4px 15px rgba(0,0,0,0.2);
      opacity:0;
      transform:translateY(-200px);
      animation: dropDown 2s ease forwards;
    }

    .sub{
      margin-top:15px;
      color:white;
      font-size:1.1rem;
      opacity:0;
      animation: fadeUp 2s ease forwards;
      animation-delay:1.5s;
    }

    .btn{
      display:inline-block;
      margin-top:40px;
      padding:14px 30px;
      border-radius:40px;
      text-decoration:none;
      color:#ff4f8b;
      background:white;
      font-weight:600;
      font-size:1rem;
      transition:0.3s;
      box-shadow:0 8px 25px rgba(0,0,0,0.15);
      opacity:0;
      animation: fadeUp 2s ease forwards;
      animation-delay:2.5s;
    }

    .btn:hover{
      transform:scale(1.08);
      background:#fff0f5;
    }

    .heart{
      position:absolute;
      color:white;
      font-size:20px;
      animation: float 6s linear infinite;
      opacity:0.7;
    }

    @keyframes dropDown{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes fadeIn{
      from{opacity:0;}
      to{opacity:1;}
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) scale(0.8);
      }
      100%{
        transform:translateY(-120vh) scale(1.2);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Happy Birthday Tanaya ❤️</h1>

    <p class="sub">
      A little surprise made with lots of love ✨
    </p>

    <!-- LINK TAG CONNECTING SECOND PAGE -->
    <a href="2index.html" class="btn">Let’s Celebrate 🎉</a>
  </div>

  <script>
    // Confetti Burst
    setInterval(() => {
      confetti({
        particleCount: 80,
        spread: 90,
        origin: { y: 0.6 }
      });
    }, 2500);

    // Floating Hearts
    function createHeart(){
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '❤️';

      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
      heart.style.fontSize = (Math.random() * 20 + 15) + 'px';

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      },7000);
    }

    setInterval(createHeart,500);
  </script>

</body>
</html>
